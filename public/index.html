<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turf Wars</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --bg:#141216; --panel:#1f1c22; --panel2:#262229; --line:#39333f;
  --cream:#f4ead8; --ink:#2a2026;
  --amber:#ffb020; --red:#e0492f; --teal:#3fb8a0; --mut:#9b93a4;
}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--cream);font:15px/1.45 system-ui,-apple-system,sans-serif;padding:14px}
button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--cream);border-radius:8px;padding:6px 12px}
button:hover:not(:disabled){border-color:var(--amber)} button:disabled{opacity:.35;cursor:default}
input{font:inherit;background:var(--panel2);border:1px solid var(--line);color:var(--cream);border-radius:8px;padding:8px 12px;width:100%}
.title{font-family:ui-monospace,monospace;letter-spacing:3px;font-weight:700;color:var(--amber)}
.lobby{max-width:480px;margin:60px auto;text-align:center;display:flex;flex-direction:column;gap:14px}
.lobby input{text-align:center}
.lobby .row{display:flex;gap:10px}
.lobby .row button{flex:1}
.code{font-family:ui-monospace,monospace;font-size:32px;letter-spacing:8px;color:var(--amber);margin:10px 0}
.waiting{color:var(--mut);font-size:13px}
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 16px;margin-bottom:12px}
.stat{font-size:13px;color:var(--mut)} .stat b{color:var(--cream)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:12px}
.pp{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.pp.cur{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.pp.me{border-color:var(--teal)}
.pp.dead{opacity:.4}
.pp h3{font-size:15px;display:flex;justify-content:space-between;align-items:center}
.hp{color:var(--red);letter-spacing:2px}
.zone{min-height:28px;margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.rat{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 6px;font-size:13px}
.rat.rat-att{border-color:var(--amber);background:#2a2010}
.rat .att{color:var(--amber);font-size:11px;margin-left:3px}
.tag{font-size:11px;border:1px solid var(--teal);color:var(--teal);border-radius:99px;padding:1px 7px;margin-left:4px}
.tag.warn{border-color:var(--red);color:var(--red)}
.meta{font-size:12px;color:var(--mut);margin-top:4px}
.main{display:grid;grid-template-columns:1fr 300px;gap:12px}
@media(max-width:860px){.main{grid-template-columns:1fr}}
.handbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
.hand{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.card{width:138px;border-radius:9px;padding:8px;display:flex;flex-direction:column;gap:4px;border:2px solid transparent;color:#fff}
.card .nm{font-weight:700;font-size:13px}
.card .ds{font-size:11px;line-height:1.3;flex:1;opacity:.88}
.card .ct{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.65}
.card button{width:100%;padding:4px;font-size:12px;background:rgba(0,0,0,.35);color:#fff;border:none;border-radius:5px;margin-top:2px}
.card button:hover:not(:disabled){background:rgba(0,0,0,.55)}
.card button:disabled{opacity:.3}
.cat-engine{background:linear-gradient(135deg,#b84a0a,#e06520);border-color:#f08040}
.cat-attack{background:linear-gradient(135deg,#8b1a1a,#c0392b);border-color:#e74c3c}
.cat-defence{background:linear-gradient(135deg,#1a3a5c,#2471a3);border-color:#3498db}
.cat-control{background:linear-gradient(135deg,#3b1a6b,#7d3c98);border-color:#9b59b6}
.cat-info{background:linear-gradient(135deg,#0e5c5c,#1a8a7a);border-color:#1abc9c}
.cat-buff{background:linear-gradient(135deg,#3a5a1a,#6b8e23);border-color:#8fbc3a}
.cat-gamble{background:linear-gradient(135deg,#7a5500,#c49a00);border-color:#f1c40f}
.cat-resource{background:linear-gradient(135deg,#1a4a1a,#2d7a2d);border-color:#4caf50}
.cat-wd{background:linear-gradient(135deg,#4a0a4a,#8b1a8b);border-color:#cc44cc}
.logbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;max-height:440px;display:flex;flex-direction:column}
.log{overflow-y:auto;font-size:13px;display:flex;flex-direction:column-reverse;gap:3px}
.log .me{color:var(--amber)} .log .dmg{color:#e06080} .log .sys{color:var(--mut);font-style:italic}
.overlay{position:fixed;inset:0;background:rgba(10,8,12,.78);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:var(--panel);border:1px solid var(--amber);border-radius:14px;padding:18px;max-width:540px;width:100%;max-height:80vh;overflow-y:auto}
.modal h4{margin-bottom:12px;color:var(--amber)}
.opts{display:flex;flex-direction:column;gap:7px}
.opts button{text-align:left;padding:9px 12px}
.opts button .sub{display:block;font-size:12px;color:var(--mut)}
.endbtn{background:var(--amber);color:var(--ink);font-weight:700;border:none}
.notif{background:#1a3a1a;border:1px solid var(--teal);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px}
.disconn{background:#3a1a1a;border:1px solid var(--red);border-radius:10px;padding:10px 14px;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState, useEffect, useRef} = React;

const socket = io();

const DEFS = {
  "Rat":{cat:"engine",ds:"When drawn: zoned immediately."},
  "Health Inspection":{cat:"attack",ds:"Fire a rat from a target's zone (1+ rats required). They lose 1 HP. Each zone once per turn. Blockable."},
  "Hot Ratato":{cat:"attack",ds:"Send 1 rat clockwise: 1, 2, or 3 seats. Blockable.",boost:"Send 2 rats."},
  "Held Rat":{cat:"engine",ds:"Place a rat from the pile into any player's zone."},
  "Infestation":{cat:"engine",ds:"Take 1 rat from pile, place on top of deck.",boost:"Take from own zone instead."},
  "Plague":{cat:"engine",ds:"Take up to 3 rats from pile, place on top of deck."},
  "Block":{cat:"defence",ds:"Reactive. Cancel a Health Inspection or Hot Ratato aimed at you.",boost:"Redirect to another valid target."},
  "Fortify":{cat:"defence",ds:"Zone immune to attacks and Chilli until your next turn."},
  "Exterminator":{cat:"defence",ds:"Remove 1 rat from your zone to the pile.",boost:"Remove 2."},
  "Ambush":{cat:"defence",ds:"Reactive. Cancel a Hot Ratato aimed at you and steal it."},
  "Redirect CW":{cat:"defence",ds:"Reactive. Redirect a Hot Ratato clockwise."},
  "Redirect CCW":{cat:"defence",ds:"Reactive. Redirect a Hot Ratato anticlockwise."},
  "Mark":{cat:"control",ds:"Next Health Inspection by anyone hits the marked player."},
  "Mark 2.0":{cat:"control",ds:"Next rat drawn from deck goes to named player's zone."},
  "Setup":{cat:"control",ds:"Draw 2, discard 1.",boost:"Draw 3, discard 1."},
  "Shakedown":{cat:"control",ds:"Name a card — target hands over 1 copy if held.",boost:"See their hand first."},
  "Bounty":{cat:"control",ds:"If target is eliminated before your next turn, keep 2 of their cards.",boost:"Keep 4."},
  "Laundering":{cat:"control",ds:"Discard up to 3 cards. Draw the same number."},
  "Kitchen Fusion":{cat:"control",ds:"Target cannot attack you until your next turn. Counts as zone interaction."},
  "Surge":{cat:"control",ds:"Draw 2 yourself OR force any player to draw 1."},
  "Russian Roulette":{cat:"gamble",ds:"Needs 1+ rat. 1 of your rats + 1 card from others, shuffled. Everyone draws 1 blind."},
  "Stakeout":{cat:"info",ds:"Look at one player's full hand.",boost:"Also get the count of a named card."},
  "Scout":{cat:"info",ds:"Look at top 3 cards of deck. Keep 1, return 2."},
  "Chilli":{cat:"buff",ds:"Attach to a rat in an opponent's zone. Detonates by end of your next turn: 1 HP. Blockable.",},
  "Rattatouli":{cat:"buff",ds:"A rat in your zone becomes a Food card in your hand."},
  "Rat Dividend":{cat:"buff",ds:"Draw 1 card per rat in your zone."},
  "Pregnant Rat":{cat:"buff",ds:"Attach to opponent's rat. Next turn it becomes 2 rats."},
  "Rat Away":{cat:"buff",ds:"Attach to your own rat. At start of your next turn it returns to the pile."},
  "Food":{cat:"resource",ds:"Spend to activate any card's boost."},
  "WD: Frenzy":{cat:"wd",ds:"When drawn: all players draw 1 card."},
  "WD: Blackout":{cat:"wd",ds:"When drawn: discard your hand and redraw the same number."},
  "WD: Rat Run CW":{cat:"wd",ds:"When drawn: every player's first rat moves clockwise."},
  "WD: Rat Run CCW":{cat:"wd",ds:"When drawn: every player's first rat moves anticlockwise."},
  "WD: Audit":{cat:"wd",ds:"When drawn: player(s) with most cards discard 1."},
  "WD: Curfew":{cat:"wd",ds:"When drawn: player with most rats moves 1 rat anywhere. Tied: discarded."},
};

function App() {
  const [phase, setPhase]       = useState('lobby'); // lobby | waiting | game
  const [name, setName]         = useState('');
  const [roomCode, setRoomCode] = useState('');
  const [joinCode, setJoinCode] = useState('');
  const [np, setNp]             = useState(4);
  const [pi, setPi]             = useState(null);
  const [G, setG]               = useState(null);
  const [lobbyNames, setLN]     = useState([]);
  const [modal, setModal]       = useState(null);
  const [notif, setNotif]       = useState(null);
  const [stakeout, setStakeout] = useState(null);
  const [scoutCards, setScout]  = useState(null);
  const [error, setError]       = useState(null);
  const piRef = useRef(null);

  useEffect(() => {
    socket.on('room_created', ({code, pi: p}) => { setRoomCode(code); setPi(p); piRef.current=p; setPhase('waiting'); setLN([name]); });
    socket.on('room_joined',  ({code, pi: p}) => { setRoomCode(code); setPi(p); piRef.current=p; setPhase('waiting'); });
    socket.on('lobby',        ({names}) => setLN(names));
    socket.on('state',        g => { setG(g); if(g.over) setModal(null); });
    socket.on('error',        msg => setError(msg));
    socket.on('stakeout',     data => setStakeout(data));
    socket.on('scout',        ({top}) => setScout(top));
    socket.on('player_disconnected', ({name}) => setNotif(`${name} disconnected.`));
    return () => socket.removeAllListeners();
  }, [name]);

  const act  = (action) => socket.emit('action',   { code: roomCode, pi: piRef.current, action });
  const react = (action) => socket.emit('reaction', { code: roomCode, pi: piRef.current, action });

  // ── lobby ───────────────────────────────────────────────
  if(phase === 'lobby') return (
    <div className="lobby">
      <h1 className="title" style={{fontSize:30}}>🐀 TURF WARS</h1>
      <input placeholder="Your name" value={name} onChange={e=>setName(e.target.value)} maxLength={16}/>
      {error && <div style={{color:'var(--red)',fontSize:13}}>{error}</div>}
      <div>
        <div style={{marginBottom:8,color:'var(--mut)',fontSize:13}}>Create a game — how many players?</div>
        <div className="row">
          {[4,5,6,7,8].map(n=><button key={n} style={np===n?{borderColor:'var(--amber)'}:{}} onClick={()=>setNp(n)}>{n}P</button>)}
        </div>
        <button style={{width:'100%',marginTop:10,background:'var(--amber)',color:'var(--ink)',fontWeight:700,border:'none'}}
          disabled={!name.trim()}
          onClick={()=>{if(name.trim()) socket.emit('create_room',{name:name.trim(),np})}}>
          Create Room
        </button>
      </div>
      <div style={{color:'var(--mut)',fontSize:13}}>— or join an existing game —</div>
      <div className="row">
        <input placeholder="Room code" value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} maxLength={4}/>
        <button disabled={!name.trim()||joinCode.length!==4}
          onClick={()=>socket.emit('join_room',{code:joinCode, name:name.trim()})}>Join</button>
      </div>
    </div>
  );

  if(phase === 'waiting') return (
    <div className="lobby">
      <h1 className="title" style={{fontSize:24}}>🐀 TURF WARS</h1>
      <div>Share this code with other players:</div>
      <div className="code">{roomCode}</div>
      <div className="waiting">{lobbyNames.length} / {np} joined</div>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:6}}>
        {lobbyNames.map((n,i)=><div key={i} style={{background:'var(--panel)',borderRadius:8,padding:'6px 12px'}}>{n}</div>)}
      </div>
      <div className="waiting">Game starts automatically when all players join.</div>
    </div>
  );

  // ── game ────────────────────────────────────────────────
  if(!G) return <div style={{padding:20,color:'var(--mut)'}}>Connecting…</div>;

  const me = G.players[pi];
  const myTurn = G.cur === pi && !G.over && !G.pendingReaction && !G.pendingModal;
  const awaitingReaction = G.pendingReaction && G.pendingReaction.to === pi;

  function ask(prompt, items, cb) {
    setModal({ prompt, items, cb });
  }
  function answer(v) { const m = modal; setModal(null); m.cb(v); }

  function hasFood() { return me.hand.some(c=>c.n==='Food'); }
  function askBoost(card, cb) {
    if(DEFS[card.n]?.boost && hasFood())
      ask(`${card.n} — boost? (${DEFS[card.n].boost})`, [{label:'Boost (spend 1 Food)',value:true},{label:'No boost',value:false}], cb);
    else cb(false);
  }

  const opps = G.players.filter(p=>p.alive && p.i!==pi);
  const touched = G.touchedZones||[];

  function canHI(t) { return t.alive && t.i!==pi && t.zone.length>0 && !t.fortify && !touched.includes(t.i) && !G.fusions.some(f=>f.placer===t.i&&f.target===pi); }
  function canHR(t) { return t.alive && t.i!==pi && !t.fortify && !touched.includes(t.i) && !G.fusions.some(f=>f.placer===t.i&&f.target===pi); }
  function zoneAvail(ti) { return !touched.includes(ti); }

  function playable(c) {
    if(!myTurn) return false;
    switch(c.n) {
      case 'Health Inspection': return !me.hand.some(()=>false) && opps.some(canHI);
      case 'Hot Ratato': return me.hand&&(me.zone||[]).length>0 && (() => { for(let d=1;d<=3;d++){let s=0,i=pi;for(let k=0;k<G.np;k++){i=(i+1)%G.np;if(G.players[i].alive){s++;if(s===d){if(canHR(G.players[i]))return true;break;}}} } return false; })();
      case 'Held Rat': return G.pile>0;
      case 'Infestation': return G.pile>0 || ((me.zone||[]).length>0 && hasFood());
      case 'Plague': return G.pile>0;
      case 'Exterminator': case 'Rattatouli': case 'Russian Roulette': case 'Rat Dividend': case 'Rat Away': return (me.zone||[]).length>0;
      case 'Chilli': case 'Pregnant Rat': return opps.some(o=>o.zone.length>0&&!o.fortify&&zoneAvail(o.i));
      case 'Block': case 'Ambush': case 'Redirect CW': case 'Redirect CCW': case 'Food': return false;
      case 'Shakedown': case 'Stakeout': case 'Mark': case 'Mark 2.0': case 'Bounty': case 'Surge': return opps.length>0;
      case 'Kitchen Fusion': return opps.length>0;
      case 'Laundering': return (me.hand||[]).length>1;
      case 'Scout': case 'Setup': case 'Fortify': case 'Laundering': return true;
      default: return true;
    }
  }

  function ratLabel(r,i) { return `Rat ${i+1}${r.att?` (${r.att.card.n})`:''}`; }
  function oppList(filter) {
    return G.players.filter(p=>p.alive&&p.i!==pi&&(filter?filter(p):true))
      .map(p=>({label:p.name, value:p.i, sub:`${p.zone.length} rats · ${p.hp} HP · ${p.handCount} cards`}));
  }

  function getCWOptions() {
    const opts = [];
    for(let dist=1;dist<=3;dist++) {
      let steps=0, i=pi;
      for(let k=0;k<G.np;k++) { i=(i+1)%G.np; if(G.players[i].alive){steps++;if(steps===dist)break;} }
      if(i!==pi && canHR(G.players[i]))
        opts.push({label:`${dist} seat${dist>1?'s':''} → ${G.players[i].name}`, value:{dist, target:i}, sub:`${G.players[i].zone.length} rats · ${G.players[i].hp} HP`});
    }
    return opts;
  }

  function humanPlay(cardId) {
    const c = me.hand.find(x=>x.id===cardId);
    if(!c || !playable(c)) return;

    if(c.n === 'Health Inspection') {
      ask('Inspect whom?', oppList(canHI), t => {
        const T = G.players[t];
        const fire = zi => act({type:'PLAY_HEALTH_INSPECTION', cardId, target:t, ratZi:zi});
        if(T.zone.some(r=>r.att)) ask('Which rat?', T.zone.map((r,i)=>({label:ratLabel(r,i),value:i})), fire);
        else fire(0);
      }); return;
    }
    if(c.n === 'Hot Ratato') {
      askBoost(c, boost => {
        const opts = getCWOptions();
        if(!opts.length) return;
        ask('Send rat clockwise how far?', opts, ({dist, target}) => {
          const T = G.players[target];
          const fire = zi => act({type:'PLAY_HOT_RATATO', cardId, target, dist, ratZi:zi, boost});
          if((me.zone||[]).some(r=>r.att)) ask('Which rat?', (me.zone||[]).map((r,i)=>({label:ratLabel(r,i),value:i})), fire);
          else fire(0);
        });
      }); return;
    }
    if(c.n === 'Held Rat') {
      ask('Place rat into whose zone?', G.players.filter(p=>p.alive).map(p=>({label:p.name+(p.i===pi?' (you)':''),value:p.i,sub:`${p.zone.length} rats`})),
        t => act({type:'PLAY_HELD_RAT', cardId, target:t})); return;
    }
    if(c.n === 'Infestation') {
      askBoost(c, boost => act({type:'PLAY_INFESTATION', cardId, boost})); return;
    }
    if(c.n === 'Plague') {
      const max = Math.min(3, G.pile);
      ask('Plague — how many rats?', Array.from({length:max},(_,i)=>({label:String(i+1),value:i+1})),
        count => act({type:'PLAY_PLAGUE', cardId, count})); return;
    }
    if(c.n === 'Setup') {
      askBoost(c, boost => act({type:'PLAY_SETUP', cardId, boost})); return;
    }
    if(c.n === 'Fortify') { act({type:'PLAY_FORTIFY', cardId}); return; }
    if(c.n === 'Exterminator') {
      askBoost(c, boost => {
        ask('Remove which rat?', (me.zone||[]).map((r,i)=>({label:ratLabel(r,i),value:i})),
          zi => act({type:'PLAY_EXTERMINATOR', cardId, ratZi:zi, boost}));
      }); return;
    }
    if(c.n === 'Mark') { ask('Mark whom?', oppList(), t => act({type:'PLAY_MARK', cardId, target:t})); return; }
    if(c.n === 'Mark 2.0') { ask('Mark 2.0 — whom?', oppList(), t => act({type:'PLAY_MARK2', cardId, target:t})); return; }
    if(c.n === 'Stakeout') {
      askBoost(c, boost => ask('Stake out whom?', oppList(), t => act({type:'PLAY_STAKEOUT', cardId, target:t, boost}))); return;
    }
    if(c.n === 'Shakedown') {
      askBoost(c, boost => ask('Shake down whom?', oppList(p=>p.handCount>0), t =>
        ask('Name the card you demand:', Object.keys(DEFS).filter(n=>n!=='Rat').map(n=>({label:n,value:n})),
          cardName => act({type:'PLAY_SHAKEDOWN', cardId, target:t, cardName, boost})))); return;
    }
    if(c.n === 'Bounty') {
      askBoost(c, boost => ask('Bounty on whom?', oppList(), t => act({type:'PLAY_BOUNTY', cardId, target:t, boost}))); return;
    }
    if(c.n === 'Laundering') {
      const max = Math.min(3, (me.hand||[]).length-1);
      ask(`Discard how many? (max ${max})`, Array.from({length:max},(_,i)=>({label:String(i+1),value:i+1})), n => {
        // pick which to discard
        const pickable = me.hand.filter(x=>x.id!==cardId);
        const picked = [];
        const step = k => {
          if(k>=n){ act({type:'PLAY_LAUNDERING', cardId, cardIds:picked}); return; }
          ask(`Discard ${k+1}/${n}:`, pickable.filter(x=>!picked.includes(x.id)).map(x=>({label:x.n,value:x.id,sub:DEFS[x.n].ds})), id => { picked.push(id); step(k+1); });
        };
        step(0);
      }); return;
    }
    if(c.n === 'Kitchen Fusion') { ask("Fuse with whom?", oppList(), t => act({type:'PLAY_KITCHEN_FUSION', cardId, target:t})); return; }
    if(c.n === 'Surge') {
      ask('Surge:', [{label:'Draw 2 yourself',value:pi},{label:'Force another to draw 1',value:-1}], v => {
        if(v===pi) act({type:'PLAY_SURGE', cardId, target:pi});
        else ask('Force whom?', oppList(), t => act({type:'PLAY_SURGE', cardId, target:t}));
      }); return;
    }
    if(c.n === 'Russian Roulette') { act({type:'PLAY_RUSSIAN_ROULETTE', cardId}); return; }
    if(c.n === 'Chilli') {
      ask('Attach Chilli to whose rat?', oppList(o=>o.zone.length>0&&!o.fortify&&zoneAvail(o.i)), t =>
        ask('Which rat?', G.players[t].zone.map((r,i)=>({label:ratLabel(r,i),value:i})),
          zi => act({type:'PLAY_CHILLI', cardId, target:t, ratZi:zi}))); return;
    }
    if(c.n === 'Rattatouli') {
      ask('Convert which rat to Food?', (me.zone||[]).map((r,i)=>({label:ratLabel(r,i),value:i})),
        zi => act({type:'PLAY_RATTATOULI', cardId, ratZi:zi})); return;
    }
    if(c.n === 'Rat Dividend') { act({type:'PLAY_RAT_DIVIDEND', cardId}); return; }
    if(c.n === 'Pregnant Rat') {
      ask('Attach Pregnant Rat to whose rat?', oppList(o=>o.zone.length>0&&!o.fortify&&zoneAvail(o.i)), t =>
        ask('Which rat?', G.players[t].zone.map((r,i)=>({label:ratLabel(r,i),value:i})),
          zi => act({type:'PLAY_PREGNANT_RAT', cardId, target:t, ratZi:zi}))); return;
    }
    if(c.n === 'Rat Away') {
      ask('Attach Rat Away to which of your rats?', (me.zone||[]).map((r,i)=>({label:ratLabel(r,i),value:i})),
        zi => act({type:'PLAY_RAT_AWAY', cardId, ratZi:zi})); return;
    }
    if(c.n === 'Scout') { act({type:'PLAY_SCOUT', cardId}); return; }
  }

  // Scout card selection
  useEffect(() => {
    if(scoutCards && pi === G?.pendingModal?.pi) {
      ask('Scout — keep which card?', scoutCards.filter(c=>c.n!=='Rat'&&!c.n.startsWith('WD:')).map(c=>({label:c.n,value:c.id,sub:DEFS[c.n]?.ds})),
        id => { act({type:'SCOUT_KEEP', cardId:id}); setScout(null); });
    }
  }, [scoutCards]);

  // Reaction UI
  function renderReaction() {
    if(!awaitingReaction) return null;
    const pr = G.pendingReaction;
    const attacker = G.players[pr.from];
    const items = [{label:'Take the hit', value:'none', sub:'No reaction'}];
    if(me.hand.some(c=>c.n==='Block')) {
      items.push({label:'Block', value:'block', sub:'Cancel the attack'});
      if(hasFood()) items.push({label:'Block + boost', value:'blockboost', sub:'Redirect to another player'});
    }
    if(pr.kind==='HR' && me.hand.some(c=>c.n==='Redirect CW'))
      items.push({label:'Redirect CW', value:'cw', sub:'Rat passes clockwise'});
    if(pr.kind==='HR' && me.hand.some(c=>c.n==='Redirect CCW'))
      items.push({label:'Redirect CCW', value:'ccw', sub:'Rat passes anticlockwise'});
    if(pr.kind==='HR' && me.hand.some(c=>c.n==='Ambush'))
      items.push({label:'Ambush', value:'ambush', sub:'Cancel and steal the card'});

    const doReact = v => {
      if(v==='none') { react({type:'REACT_NONE'}); return; }
      if(v==='block') { react({type:'REACT_BLOCK'}); return; }
      if(v==='blockboost') {
        ask('Redirect to whom?', oppList(p=>p.i!==pr.from&&p.alive), t => react({type:'REACT_BLOCK_BOOST', redirectTo:t})); return;
      }
      if(v==='cw') { react({type:'REACT_REDIRECT_CW'}); return; }
      if(v==='ccw') { react({type:'REACT_REDIRECT_CCW'}); return; }
      if(v==='ambush') { react({type:'REACT_AMBUSH'}); return; }
    };

    return (
      <div className="overlay"><div className="modal">
        <h4>⚡ {attacker.name} attacks you ({pr.kind==='HI'?'Health Inspection':'Hot Ratato'})!</h4>
        <div className="opts">
          {items.map((it,i)=><button key={i} onClick={()=>doReact(it.value)}>{it.label}<span className="sub">{it.sub}</span></button>)}
        </div>
      </div></div>
    );
  }

  return (
    <div>
      {notif && <div className="notif">{notif} <button style={{float:'right',padding:'2px 8px'}} onClick={()=>setNotif(null)}>×</button></div>}
      <div className="top">
        <span className="title" style={{fontSize:18}}>🐀 TURF WARS</span>
        <span className="stat">Room <b style={{fontFamily:'monospace',letterSpacing:2}}>{roomCode}</b></span>
        <span className="stat">Round <b>{G.round}</b></span>
        <span className="stat">Deck <b>{G.deckCount}</b></span>
        <span className="stat">Pile <b>{G.pile}</b></span>
        <span className="stat">Turn: <b>{G.over?`Game over — ${G.players[G.winner].name} wins`:G.players[G.cur].name}</b></span>
        <span style={{flex:1}}/>
        {myTurn && <button className="endbtn" onClick={()=>act({type:'END_TURN'})}>End turn</button>}
        {awaitingReaction && <span style={{color:'var(--amber)',fontWeight:700}}>⚡ React!</span>}
        {!myTurn && !awaitingReaction && !G.over && <span style={{color:'var(--mut)',fontSize:13}}>{G.players[G.cur].name}'s turn…</span>}
      </div>

      <div className="grid">
        {G.players.map(p=>{
          const tags=[];
          if(p.fortify) tags.push(<span key="f" className="tag">Fortified</span>);
          if(G.mark?.target===p.i) tags.push(<span key="m" className="tag warn">Marked</span>);
          if(G.mark2?.target===p.i) tags.push(<span key="m2" className="tag warn">Mark 2.0</span>);
          if((G.bounties||[]).some(b=>b.target===p.i)) tags.push(<span key="b" className="tag warn">Bounty</span>);
          if((G.fusions||[]).some(f=>f.placer===p.i)) tags.push(<span key="kf" className="tag">Fused</span>);
          return (
            <div key={p.i} className={`pp${G.cur===p.i&&!G.over?' cur':''}${p.i===pi?' me':''}${p.alive?'':' dead'}`}>
              <h3>
                <span>{p.name}{p.i===pi?' (you)':''}{tags}</span>
                <span className="hp">{p.alive?'♥'.repeat(p.hp):'☠'}</span>
              </h3>
              <div className="zone">
                {p.zone.length===0&&<span className="meta">zone clear</span>}
                {p.zone.map((r,i)=><span key={r.id} className={`rat${r.att?' rat-att':''}`}>🐀{r.att&&<span className="att">{r.att.card.n}</span>}</span>)}
              </div>
              <div className="meta">{p.i===pi?`${(p.hand||[]).length} cards in hand`:`${p.handCount} cards in hand`}</div>
            </div>
          );
        })}
      </div>

      <div className="main">
        <div className="handbox">
          <b>Your hand</b>
          <div className="hand">
            {(me.hand||[]).map(c=>(
              <div key={c.id} className={`card cat-${DEFS[c.n]?.cat||'engine'}`}>
                <div className="ct">{DEFS[c.n]?.cat}</div>
                <div className="nm">{c.n}</div>
                <div className="ds">{DEFS[c.n]?.ds}</div>
                <button disabled={!playable(c)} onClick={()=>humanPlay(c.id)}>
                  {['Block','Ambush','Redirect CW','Redirect CCW'].includes(c.n)?'Reactive':c.n==='Food'?'Resource':'Play'}
                </button>
              </div>
            ))}
            {(me.hand||[]).length===0&&<span className="meta">No cards.</span>}
          </div>
        </div>
        <div className="logbox">
          <b style={{marginBottom:8}}>Street talk</b>
          <div className="log">
            {(G.log||[]).map((e,i)=><div key={i} className={e.cls}>{e.msg}</div>)}
          </div>
        </div>
      </div>

      {stakeout && (
        <div className="overlay"><div className="modal">
          <h4>Stakeout — {G.players[stakeout.target].name}'s hand</h4>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,margin:'10px 0'}}>
            {stakeout.hand.map(c=><div key={c.id} className={`card cat-${DEFS[c.n]?.cat||'engine'}`} style={{width:120}}>
              <div className="nm">{c.n}</div></div>)}
            {!stakeout.hand.length&&<span className="meta">(empty)</span>}
          </div>
          <button onClick={()=>setStakeout(null)}>Done</button>
        </div></div>
      )}

      {modal && !awaitingReaction && (
        <div className="overlay"><div className="modal">
          <h4>{modal.prompt}</h4>
          <div className="opts">
            {modal.items.map((it,i)=><button key={i} onClick={()=>answer(it.value)}>
              {it.label}{it.sub&&<span className="sub">{it.sub}</span>}
            </button>)}
          </div>
        </div></div>
      )}

      {renderReaction()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
